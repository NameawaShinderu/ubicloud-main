version: '3.8'

services:
  postgres:
    image: postgres:15.8
    container_name: ubicloud-postgres
    env_file: .env
    ports:
      - 5432:5432
    volumes:
      - postgres:/var/lib/postgresql/data
      - ./init_db.sh:/docker-entrypoint-initdb.d/init_db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-migrator:
    image: ubicloud/ubicloud:latest
    container_name: ubicloud-db-migrator
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    volumes:
      # Mount your code changes into the container
      - ..:/app
      - /app/node_modules  # Prevent overwriting node_modules
      - bundle_cache:/usr/local/bundle  # Cache gems
    environment:
      - RACK_ENV=development  # Enable development mode
    command: bundle exec rake dev_up

  app:
    image: ubicloud/ubicloud:latest
    container_name: ubicloud-app
    depends_on:
      db-migrator:
        condition: service_completed_successfully
    env_file: .env
    ports:
      - 3000:3000
    volumes:
      # 🎯 KEY ADDITION: Mount local code into container
      - ..:/app
      - /app/node_modules  # Prevent overwriting node_modules
      - bundle_cache:/usr/local/bundle  # Cache gems
    environment:
      - RACK_ENV=development  # Enable development mode
    command: foreman start

volumes:
  postgres:
  bundle_cache:
